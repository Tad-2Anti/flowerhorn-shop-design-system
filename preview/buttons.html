<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f2f4f3; padding: 20px; }
  .grid { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .section-title { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; }
  /* Single theme: Brand Crimson #8c2515 */
  .btn { display: inline-flex; align-items: center; gap: 6px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 700; text-decoration: none; transition: all 300ms cubic-bezier(0,0,0.25,1); }
  .btn-primary   { background: #8c2515; color: #fff; border-radius: 50px; padding: 10px 22px; font-size: 15px; }
  .btn-hover     { background: #6e1c10; color: #fff; border-radius: 50px; padding: 10px 22px; font-size: 15px; }
  .btn-focus     { background: #8c2515; color: #fff; border-radius: 50px; padding: 10px 22px; font-size: 15px; outline: 2px solid #8c2515; outline-offset: 3px; }
  .btn-active    { background: #6e1c10; color: #fff; border-radius: 50px; padding: 10px 22px; font-size: 15px; transform: scale(0.97); }
  .btn-disabled  { background: #e8e8e8; color: #aaa; border-radius: 50px; padding: 10px 22px; font-size: 15px; cursor: not-allowed; }
  .btn-loading   { background: #8c2515; color: rgba(255,255,255,0.6); border-radius: 50px; padding: 10px 22px; font-size: 15px; }
  .btn-ghost     { background: transparent; color: #8c2515; border: 2px solid #8c2515; border-radius: 50px; padding: 9px 22px; font-size: 15px; }
  .btn-ghost-hover { background: #8c2515; color: #fff; border: 2px solid #8c2515; border-radius: 50px; padding: 9px 22px; font-size: 15px; }
  .btn-outline   { background: transparent; color: #090909; border: 1.5px solid rgba(0,0,0,0.15); border-radius: 50px; padding: 9px 22px; font-size: 15px; }
  .btn-text-link { background: transparent; color: #8c2515; padding: 6px 0; font-size: 15px; border: none; text-decoration: underline; }
  .btn-sm  { background: #8c2515; color: #fff; border-radius: 50px; padding: 7px 16px; font-size: 13px; }
  .btn-lg  { background: #8c2515; color: #fff; border-radius: 50px; padding: 14px 32px; font-size: 18px; }
  .btn-icon { background: #f2f4f3; border-radius: 50%; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; border: none; font-size: 17px; }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; display: inline-block; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .label { font-size: 10px; color: #9ca3af; font-weight: 700; letter-spacing: 0.06em; }
  .dark-surface { background: #0a0f0d; padding: 14px; border-radius: 6px; display: flex; gap: 10px; align-items: center; }
  .btn-dark-ghost { background: transparent; color: #faf4d8; border: 1.5px solid rgba(250,244,216,0.3); border-radius: 50px; padding: 10px 22px; font-size: 15px; }
</style>
</head>
<body>
<div class="grid">
  <div class="section-title">States — Primary Button (Brand Crimson only)</div>
  <div class="row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-primary">Add to Cart</button><span class="label">default</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-hover">Add to Cart</button><span class="label">hover</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-focus">Add to Cart</button><span class="label">focus-visible</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-active">Adding…</button><span class="label">active</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-disabled" disabled>Unavailable</button><span class="label">disabled</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-loading"><span class="spinner"></span>Adding…</button><span class="label">loading</span>
    </div>
  </div>
  <div class="section-title">Variants — All use Crimson theme</div>
  <div class="row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-primary">Add to Cart</button><span class="label">filled</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-ghost">Contact Us</button><span class="label">ghost</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-ghost-hover">Contact Us</button><span class="label">ghost:hover</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-outline">Learn More</button><span class="label">neutral outline</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-text-link">View details →</button><span class="label">text link</span>
    </div>
  </div>
  <div class="section-title">Sizes</div>
  <div class="row">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-sm">Shop Now</button><span class="label">small</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-primary">Add to Cart</button><span class="label">default</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn btn-lg">Explore All Fish</button><span class="label">large</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <button class="btn-icon">♡</button><span class="label">icon-only</span>
    </div>
  </div>
  <div class="section-title">Dark Surface</div>
  <div class="dark-surface">
    <button class="btn btn-primary">Shop Fish</button>
    <button class="btn btn-dark-ghost">Learn More</button>
  </div>
</div>
</body>
</html>
