<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f2f4f3; padding: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .section-title { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #9ca3af; grid-column: 1/-1; margin-top: 8px; }
  .card { background: #fff; border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .token-row { display: flex; align-items: center; gap: 8px; }
  .bar { background: #C1321A; border-radius: 3px; height: 10px; flex-shrink: 0; }
  .token { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #6b7280; width: 72px; }
  .val { font-size: 10px; color: #090909; font-weight: 700; }
</style>
</head>
<body>
<div class="grid">
  <div class="section-title">Spacing Scale (Component)</div>
  <div class="card">
    <div class="token-row"><span class="token">space.1</span><div class="bar" style="width:4px"></div><span class="val">4px</span></div>
    <div class="token-row"><span class="token">space.2</span><div class="bar" style="width:5.4px"></div><span class="val">5.4px</span></div>
    <div class="token-row"><span class="token">space.3</span><div class="bar" style="width:5.76px"></div><span class="val">5.76px</span></div>
    <div class="token-row"><span class="token">space.4</span><div class="bar" style="width:6px"></div><span class="val">6px</span></div>
    <div class="token-row"><span class="token">space.5</span><div class="bar" style="width:9px"></div><span class="val">9px</span></div>
    <div class="token-row"><span class="token">space.6</span><div class="bar" style="width:11.52px"></div><span class="val">11.52px</span></div>
    <div class="token-row"><span class="token">space.7</span><div class="bar" style="width:12px"></div><span class="val">12px</span></div>
    <div class="token-row"><span class="token">space.8</span><div class="bar" style="width:14px"></div><span class="val">14px</span></div>
  </div>
  <div class="card">
    <div class="token-row"><span class="token">space.10</span><div class="bar" style="width:16px;background:#357e51"></div><span class="val">16px</span></div>
    <div class="token-row"><span class="token">space.12</span><div class="bar" style="width:20px;background:#357e51"></div><span class="val">20px</span></div>
    <div class="token-row"><span class="token">space.16</span><div class="bar" style="width:24px;background:#357e51"></div><span class="val">24px</span></div>
    <div class="token-row"><span class="token">space.20</span><div class="bar" style="width:32px;background:#1559d5"></div><span class="val">32px</span></div>
    <div class="token-row"><span class="token">space.24</span><div class="bar" style="width:40px;background:#1559d5"></div><span class="val">40px</span></div>
    <div class="token-row"><span class="token">space.32</span><div class="bar" style="width:56px;background:#1559d5"></div><span class="val">56px</span></div>
    <div class="token-row"><span class="token">space.40</span><div class="bar" style="width:64px;background:#E8A920"></div><span class="val">64px</span></div>
    <div class="token-row"><span class="token">space.64</span><div class="bar" style="width:96px;background:#E8A920"></div><span class="val">96px</span></div>
  </div>
</div>
</body>
</html>
