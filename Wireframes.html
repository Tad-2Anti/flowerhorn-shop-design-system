<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowerHorn Shop — Website Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Caveat',cursive;background:#e8e3db}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const BRAND='#8c2515', DARK='#1a1a1a', LG='#e0dbd4', WF="'Caveat',cursive";
const HATCH="repeating-linear-gradient(45deg,#d0cbc4 0px,#d0cbc4 1px,#ede9e3 1px,#ede9e3 12px)";

const GUPPIES=[
  {name:"Female Guppies",price:29,old:50},{name:"Mixed Colour Male Guppy",price:39,old:50},
  {name:"Half Black Guppy",price:99,old:199},{name:"Cobra Tail Guppy",price:105,old:149},
  {name:"Platinum Red Guppy",price:119,old:199},{name:"Fancy Tail Guppy",price:129,old:200},
  {name:"Yellow Gold Tuxedo Guppy",price:129,old:150},{name:"Big Ear Mosaic Thailand Guppies",price:null},
  {name:"Tuxedo White Guppy",price:199,old:249},{name:"Golden Red Guppy",price:199,old:300},
  {name:"Full Black Guppy",price:199,old:300},{name:"Koi Guppies",price:249,old:300},
  {name:"Full Red Albino Guppy",price:249,old:400},
];
const CATS=[
  {n:"Flowerhorn Fish",c:"12 varieties"},{n:"Cichlids",c:"25 species"},{n:"Guppy Collection",c:"14 varieties"},
  {n:"Betta Collection",c:"10 varieties"},{n:"Tetras & Rasboras",c:"14 species"},
  {n:"Mollys & Platies",c:"10 varieties"},{n:"Goldfish & Koi",c:"8 species"},
  {n:"Aquarium Tanks",c:"20 products"},{n:"Accessories & Decor",c:"56 products"},{n:"Plants & Food",c:"31 products"},
];
const BEST=[
  {name:"Full Red Albino Guppy",price:249,old:400,badge:"Sale"},
  {name:"Elephant Ear Betta Adult",price:210,old:300,badge:"Sale"},
  {name:"Convict Cichlid",price:199,old:249,badge:"Sale"},
  {name:"Koi Guppies",price:249,old:300,badge:"Bestseller"},
];

/* ── PRIMITIVES ── */
function Img({h=120,label="Image",style={}}){
  return <div style={{height:h,background:HATCH,border:"1.5px solid #b8b3ac",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:WF,fontSize:13,color:"#999",textAlign:"center",padding:8,flexShrink:0,...style}}>{label}</div>;
}
function Btn({children,primary,ghost,white,small,style={}}){
  const base={display:"inline-flex",alignItems:"center",justifyContent:"center",padding:small?"5px 10px":"8px 16px",borderRadius:4,fontFamily:WF,fontSize:small?12:14,fontWeight:600,cursor:"default",whiteSpace:"nowrap"};
  if(primary) return <div style={{...base,background:BRAND,color:"#fff",border:`2px solid ${BRAND}`,...style}}>{children}</div>;
  if(white)   return <div style={{...base,background:"transparent",color:"#fff",border:"2px solid rgba(255,255,255,0.55)",...style}}>{children}</div>;
  if(ghost)   return <div style={{...base,background:"transparent",color:BRAND,border:`2px solid ${BRAND}`,...style}}>{children}</div>;
  return <div style={{...base,background:"transparent",color:"#555",border:"2px solid #bbb",...style}}>{children}</div>;
}
function Note({children,style={}}){
  return <div style={{fontFamily:WF,fontSize:11,color:"#999",fontStyle:"italic",borderLeft:"2px solid #ccc",paddingLeft:6,marginTop:4,lineHeight:1.45,...style}}>{children}</div>;
}
function Bdg({children,sale,sold,style={}}){
  const bg=sold?"#bbb":sale?BRAND:"#555", c=sold?"#555":"#fff";
  return <span style={{display:"inline-flex",padding:"1px 7px",borderRadius:20,background:bg,color:c,fontFamily:WF,fontSize:11,fontWeight:700,...style}}>{children}</span>;
}
function SL({children}){
  return <div style={{position:"absolute",top:0,right:0,background:"rgba(255,255,255,0.9)",border:"1px dashed #ccc",padding:"2px 8px",fontSize:11,fontFamily:WF,color:"#aaa",fontStyle:"italic",zIndex:10,borderRadius:"0 0 0 4px"}}>{children}</div>;
}
function Sec({label,bg="#fff",style={},children}){
  return <div style={{position:"relative",background:bg,borderBottom:"1px solid #d4cec8",...style}}>{label&&<SL>{label}</SL>}{children}</div>;
}
function Row({children,gap=8,align="center",wrap,justify,style={}}){
  return <div style={{display:"flex",gap,alignItems:align,flexWrap:wrap?"wrap":"nowrap",justifyContent:justify||"flex-start",...style}}>{children}</div>;
}

/* ── PRODUCT CARD ── */
function WfCard({name,price,old,badge,sold}){
  return(
    <div style={{background:"#fff",border:`1.5px solid ${LG}`,borderRadius:4,overflow:"hidden",flex:1,minWidth:0}}>
      <div style={{position:"relative"}}>
        <Img h={110} label="Fish photo" style={{border:"none"}}/>
        {badge&&<Bdg sale style={{position:"absolute",top:8,left:8}}>{badge}</Bdg>}
        {sold&&<Bdg sold style={{position:"absolute",top:8,right:8}}>Sold Out</Bdg>}
      </div>
      <div style={{padding:"8px 10px"}}>
        <div style={{fontFamily:WF,fontSize:13,fontWeight:700,color:"#222",marginBottom:2,lineHeight:1.3}}>{name}</div>
        {sold?(
          <div style={{border:"1.5px dashed #ccc",borderRadius:4,padding:"5px 0",textAlign:"center",fontFamily:WF,fontSize:11,color:"#aaa",marginTop:6}}>Notify me when available</div>
        ):(
          <>
            <Row gap={6} style={{marginBottom:6}}>
              <span style={{fontFamily:WF,fontSize:15,fontWeight:700,color:"#222"}}>₹{price}</span>
              {old&&<span style={{fontFamily:WF,fontSize:12,color:"#aaa",textDecoration:"line-through"}}>₹{old}</span>}
            </Row>
            <Btn primary style={{width:"100%",justifyContent:"center",padding:"6px 0",fontSize:12}}>Add to cart</Btn>
          </>
        )}
      </div>
    </div>
  );
}

/* ── SHARED SECTIONS ── */
function AnnoBar(){
  return(
    <Sec label="Anno bar · 36px · auto-rotate 5s · dismissible · stores pref in localStorage" bg={DARK}>
      <div style={{height:36,display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
        <span style={{fontFamily:WF,fontSize:14,color:"#e8e0d0"}}>‹&nbsp; Free delivery across South India on orders above ₹999 · Live fish packed with oxygen &nbsp;›</span>
        <span style={{fontFamily:WF,fontSize:12,color:"#666",marginLeft:12}}>✕</span>
      </div>
    </Sec>
  );
}
function Nav({dark}={}){
  const bg=dark?"#0a0f0d":"#fff", tc=dark?"rgba(250,244,216,0.75)":"#333";
  return(
    <Sec label="Sticky nav · 64px · Logo | Nav links | Search · Wishlist · Account · Cart(badge) · hover 'Live Fish' → mega menu" bg={bg} style={{borderBottom:`1px solid ${dark?"rgba(255,255,255,0.08)":"#e8e8e8"}`}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"0 48px",height:64,display:"flex",alignItems:"center",gap:24}}>
        <Row gap={8} style={{flexShrink:0}}>
          <div style={{width:32,height:32,background:BRAND,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontFamily:WF,fontSize:18,fontWeight:700}}>F</div>
          <div style={{fontFamily:WF,fontSize:15,fontWeight:700,color:dark?"#faf4d8":"#090909"}}>FlowerHorn Shop</div>
        </Row>
        <div style={{flex:1,display:"flex",gap:2,justifyContent:"center"}}>
          {[["Live Fish ▾",true],["Tanks ▾",false],["Equipment ▾",false],["Accessories",false],["About",false]].map(([l,active])=>(
            <div key={l} style={{padding:"6px 14px",fontFamily:WF,fontSize:14,fontWeight:600,color:active?BRAND:tc,borderBottom:active?`2px solid ${BRAND}`:"2px solid transparent"}}>{l}</div>
          ))}
        </div>
        <Row gap={6}>
          {["⌕ Search","♡ Wishlist","👤 Account","🛒 Cart (2)"].map((icon,i)=>(
            <div key={i} style={{padding:"5px 10px",borderRadius:4,border:`1.5px dashed ${i===3?BRAND:"#ccc"}`,color:dark?"#faf4d8":i===3?"#fff":"#555",background:i===3?BRAND:"transparent",fontFamily:WF,fontSize:12}}>{icon}</div>
          ))}
        </Row>
      </div>
      <Note style={{margin:"0 48px 6px",fontSize:11}}>Hover "Live Fish" → full-width mega-menu (10 category cols + featured image). Mobile: hamburger → left-side drawer (320px) with accordion sub-items.</Note>
    </Sec>
  );
}
function Trust(){
  return(
    <Sec label="Trust strip · 72px · 4 icons · separated by 1px dividers · mobile: 2×2 grid" bg="#f0ebe3">
      <div style={{maxWidth:1200,margin:"0 auto",padding:"0 48px",height:72,display:"flex",alignItems:"center",justifyContent:"space-around"}}>
        {[["🐟","Live delivery · Mon–Sat"],["🛡","Oxygen-packed · Safe transit"],["⭐","100+ species available"],["📍","Madurai store + online"]].map(([icon,text])=>(
          <Row key={text} gap={8}><span style={{fontSize:18,color:BRAND}}>{icon}</span><span style={{fontFamily:WF,fontSize:14,color:"#555"}}>{text}</span></Row>
        ))}
      </div>
    </Sec>
  );
}
function Footer(){
  return(
    <Sec label="Footer · 4 cols · dark bg · crimson top border · mobile: accordion stacks · payment icons" bg="#111" style={{borderTop:`2px solid ${BRAND}`}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"36px 48px 18px"}}>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1.5fr",gap:28,marginBottom:18}}>
          <div>
            <Row gap={8} style={{marginBottom:10}}><div style={{width:26,height:26,background:BRAND,borderRadius:3}}/>
              <div style={{fontFamily:WF,fontSize:14,fontWeight:700,color:"#e8e0d0"}}>FlowerHorn Shop</div></Row>
            {[1,2].map(i=><div key={i} style={{height:7,background:"rgba(255,255,255,0.1)",borderRadius:2,marginBottom:5}}/>)}
            <div style={{height:7,width:"55%",background:"rgba(255,255,255,0.1)",borderRadius:2,marginBottom:12}}/>
            <Row gap={5}>{["IG","FB","WA","YT"].map(s=><div key={s} style={{width:24,height:24,borderRadius:4,background:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:WF,fontSize:10,color:"#777"}}>{s}</div>)}</Row>
          </div>
          {[["Shop",["Guppy Collection","Betta Collection","Cichlids","Accessories","View all →"]],["Help",["Track order","Shipping policy","Returns","Care guides","Contact"]]].map(([h,links])=>(
            <div key={h}><div style={{fontFamily:WF,fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>{h}</div>
              {links.map(l=><div key={l} style={{fontFamily:WF,fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:5}}>{l}</div>)}</div>
          ))}
          <div><div style={{fontFamily:WF,fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.3)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10}}>Get in Touch</div>
            {[["📞","+91 XXXXX XXXXX"],["💬","WhatsApp us"],["✉","hello@flowerhorn.in"],["📍","#80 Kannimandai Main Rd, Madurai-625 014"],["🕐","Mon–Sun · 9 AM – 9 PM"]].map(([icon,text])=>(
              <Row key={text} gap={5} align="flex-start" style={{marginBottom:5}}><span style={{fontSize:13}}>{icon}</span><span style={{fontFamily:WF,fontSize:11,color:"rgba(255,255,255,0.5)",lineHeight:1.4}}>{text}</span></Row>
            ))}</div>
        </div>
        <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontFamily:WF,fontSize:11,color:"rgba(255,255,255,0.22)"}}>© 2026 FlowerHorn Shop, Madurai. All rights reserved.</span>
          <Row gap={5}>{["UPI","Razorpay","COD","Visa"].map(p=><span key={p} style={{fontFamily:WF,fontSize:10,color:"rgba(255,255,255,0.3)",border:"1px solid rgba(255,255,255,0.1)",padding:"1px 5px",borderRadius:3}}>{p}</span>)}</Row>
        </div>
      </div>
    </Sec>
  );
}

/* ── HOME V1 — Classic ── */
function HomeA(){
  return(
    <div>
      <AnnoBar/><Nav/>
      <Sec label="Hero · 560px · full-bleed image + 35% dark overlay (bottom 2/3) · left-aligned text · 2 CTAs · floating trust pill">
        <div style={{position:"relative",height:560}}>
          <Img h={560} label="Hero — stunning planted tank or underwater aquarium — high quality photo" style={{position:"absolute",inset:0,height:"100%",border:"none"}}/>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to right,rgba(0,0,0,0.8) 0%,rgba(0,0,0,0.2) 70%)"}}/>
          <div style={{position:"absolute",top:24,right:48,background:"#fff",borderRadius:50,padding:"5px 14px",display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontFamily:WF,fontSize:13,color:"#333"}}>🚚 Ships Mon–Sat</span>
          </div>
          <div style={{position:"absolute",bottom:64,left:64,maxWidth:520}}>
            <div style={{fontFamily:WF,fontSize:11,color:"#faf4d8",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12,opacity:0.75}}>MADURAI'S #1 AQUARIUM FISH STORE</div>
            <div style={{fontFamily:WF,fontSize:46,fontWeight:700,color:"#faf4d8",lineHeight:1.1,marginBottom:14}}>Exotic Fish.<br/>Thriving Tanks.<br/>Delivered Safe.</div>
            <div style={{fontFamily:WF,fontSize:17,color:"rgba(250,244,216,0.8)",marginBottom:28,lineHeight:1.5}}>100+ species. Ships across South India. Packed with oxygen.</div>
            <Row gap={16}><Btn primary style={{fontSize:16,padding:"12px 28px"}}>Shop Live Fish</Btn><Btn white style={{fontSize:16,padding:"12px 28px"}}>Explore Tanks</Btn></Row>
          </div>
        </div>
        <Note style={{margin:"5px 48px"}}>Image TBD — high-quality fish/tank photography required. Text overlay at 35% opacity on bottom 2/3 only. CTA min 44px touch target.</Note>
      </Sec>
      <Trust/>
      <Sec label="Shop by Fish Type · 5×2 grid · PRIMARY section — above fold on desktop · hover: scale(1.02) + crimson border · mobile: 2-col">
        <div style={{maxWidth:1200,margin:"0 auto",padding:"48px 48px"}}>
          <div style={{textAlign:"center",marginBottom:28}}>
            <div style={{fontFamily:WF,fontSize:28,fontWeight:700,color:"#090909",marginBottom:6}}>Shop Live Fish by Type</div>
            <div style={{fontFamily:WF,fontSize:15,color:"#888"}}>10 collections · 100+ species · ships across South India</div>
          </div>
          {[CATS.slice(0,5),CATS.slice(5,10)].map((row,ri)=>(
            <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:12}}>
              {row.map(cat=>(
                <div key={cat.n} style={{border:`1.5px solid ${LG}`,borderRadius:6,overflow:"hidden"}}>
                  <Img h={95} label={cat.n} style={{border:"none"}}/>
                  <div style={{padding:"8px 10px",background:"#fff"}}>
                    <div style={{fontFamily:WF,fontSize:13,fontWeight:700,color:"#222"}}>{cat.n}</div>
                    <div style={{fontFamily:WF,fontSize:11,color:"#888"}}>{cat.c}</div>
                    <div style={{fontFamily:WF,fontSize:12,fontWeight:700,color:"#333",marginTop:2}}>From ₹29</div>
                  </div>
                </div>
              ))}
            </div>
          ))}
          <div style={{textAlign:"center",marginTop:16}}><span style={{fontFamily:WF,fontSize:14,color:BRAND,textDecoration:"underline",cursor:"default"}}>View all Live Fish →</span></div>
          <Note>Open Q1: "Flowerhorn Fish" has 5 sub-varieties. Rec: Option B — click goes to product grid with filter chips pre-applied (fewer taps than sub-category page).</Note>
        </div>
      </Sec>
      <Sec label="Bestsellers · 4-col product grid · horizontal scroll mobile · data from Shopify 'Bestseller' tag" bg="#f0ebe3">
        <div style={{maxWidth:1200,margin:"0 auto",padding:"48px 48px"}}>
          <div style={{fontFamily:WF,fontSize:26,fontWeight:700,color:"#090909",marginBottom:22}}>Most Popular Fish This Week</div>
          <Row gap={14} align="stretch">{BEST.map(p=><WfCard key={p.name} {...p}/>)}</Row>
          <div style={{textAlign:"center",marginTop:22}}><Btn style={{padding:"10px 32px",fontSize:14}}>See all products →</Btn></div>
          <Note>Open Q2: Quick "Add to cart" on grid card (shown here) OR always route to PDP first? Recommend grid-level add-to-cart for low-consideration items (guppies, tetras). Flag for client.</Note>
        </div>
      </Sec>
      <Sec label="Editorial insert · 320px · 50/50 split · aquascaping services upsell · mobile: stacked">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",height:320}}>
          <Img h={320} label="Planted aquascape / beautiful tank setup photo" style={{border:"none"}}/>
          <div style={{padding:"48px 40px",display:"flex",flexDirection:"column",justifyContent:"center",gap:14}}>
            <div style={{fontFamily:WF,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"#888"}}>Aquascaping Services</div>
            <div style={{fontFamily:WF,fontSize:28,fontWeight:700,color:"#090909"}}>We Build Dream Tanks</div>
            <div style={{fontFamily:WF,fontSize:15,color:"#666",lineHeight:1.6}}>Custom planted tanks, aquascape setups, and full installations across Madurai.</div>
            <Btn style={{alignSelf:"flex-start"}}>Learn more</Btn>
          </div>
        </div>
      </Sec>
      <Sec label="Reviews · 3 cards · star rating · 4.8/5 summary · location tags · mobile: horizontal scroll">
        <div style={{maxWidth:1200,margin:"0 auto",padding:"48px 48px"}}>
          <div style={{textAlign:"center",marginBottom:22}}>
            <div style={{fontFamily:WF,fontSize:26,fontWeight:700,color:"#090909"}}>What Our Customers Say</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:20}}>
            {[["Chennai","Ordered parrot fishes — arrived active, packed safely. Highly recommend!","Live fish"],["Coimbatore","Plants arrived healthy and vibrant. Website easy to navigate.","Aquatic plants"],["Salem","Guided me perfectly over phone. Top-notch service.","Guppy Collection"]].map(([city,r,purchase])=>(
              <div key={city} style={{background:"#f8f4ee",border:`1.5px solid ${LG}`,borderRadius:6,padding:"14px 16px"}}>
                <div style={{color:BRAND,marginBottom:6,fontSize:16}}>★★★★★</div>
                <div style={{fontFamily:WF,fontSize:13,color:"#444",fontStyle:"italic",lineHeight:1.6,marginBottom:8}}>"{r}"</div>
                <div style={{fontFamily:WF,fontSize:13,fontWeight:700,color:"#222"}}>— {city} Customer</div>
                <div style={{fontFamily:WF,fontSize:11,color:"#888"}}>Purchased: {purchase}</div>
              </div>
            ))}
          </div>
          <Row justify="center" gap={12}>
            <span style={{fontFamily:WF,fontSize:34,fontWeight:700,color:BRAND}}>4.8</span>
            <span style={{fontFamily:WF,fontSize:14,color:"#888"}}>/5 · Based on 200+ verified orders · Google + Shopify</span>
          </Row>
        </div>
      </Sec>
      <Sec label="Instagram feed · 6 square images · @flowerhorn_shop_madurai · hover: dark overlay + link icon · mobile: 4 + '+N more'">
        <div style={{textAlign:"center",padding:"18px 0 8px",fontFamily:WF,fontSize:17,color:BRAND}}>@flowerhorn_shop_madurai</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)"}}>
          {[...Array(6)].map((_,i)=><Img key={i} h={120} label={i===5?"+28 more":"IG post"} style={{border:"none",borderRight:i<5?"1px solid #fff":"none"}}/>)}
        </div>
        <Note style={{margin:"5px 48px"}}>Open Q5: Live via Instagram API (requires token + caching) OR manual image upload (simpler, no API). Recommend manual for launch, API in Phase 2.</Note>
      </Sec>
      <Footer/>
    </div>
  );
}

/* ── HOME V2 — Editorial / Dark ── */
function HomeB(){
  return(
    <div>
      <AnnoBar/><Nav dark/>
      <Sec label="Hero V2 · Split layout · text left · hero fish photo right · stat row · dark bg" bg="#0a0f0d">
        <div style={{maxWidth:1200,margin:"0 auto",padding:"80px 48px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:48,alignItems:"center",minHeight:480}}>
          <div>
            <div style={{fontFamily:WF,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(250,244,216,0.4)",marginBottom:18}}>Est. 2012 · Madurai, Tamil Nadu</div>
            <div style={{fontFamily:WF,fontSize:52,fontWeight:700,color:"#faf4d8",lineHeight:1.1,marginBottom:20}}>Premium<br/>Flowerhorn<br/>Fish.</div>
            <div style={{fontFamily:WF,fontSize:17,color:"rgba(250,244,216,0.55)",marginBottom:30,lineHeight:1.6}}>Hand-selected. Oxygen-packed. Delivered safe across South India.</div>
            <Row gap={12}><Btn primary style={{fontSize:16,padding:"12px 28px"}}>Shop Now →</Btn><Btn white style={{fontSize:16,padding:"12px 28px"}}>Our Story</Btn></Row>
            <div style={{display:"flex",gap:32,marginTop:30}}>
              {[["100+","Species"],["500+","Happy orders"],["4.8★","Customer rating"]].map(([v,l])=>(
                <div key={l}><div style={{fontFamily:WF,fontSize:22,fontWeight:700,color:"#faf4d8"}}>{v}</div>
                  <div style={{fontFamily:WF,fontSize:12,color:"rgba(250,244,216,0.3)"}}>{l}</div></div>
              ))}
            </div>
          </div>
          <div style={{position:"relative"}}>
            <Img h={380} label="Hero fish — premium flowerhorn close-up photo" style={{borderRadius:8,border:"1px solid rgba(255,255,255,0.08)"}}/>
            <div style={{position:"absolute",bottom:14,left:14,background:"rgba(0,0,0,0.75)",borderRadius:6,padding:"8px 14px",fontFamily:WF}}>
              <div style={{fontSize:14,color:"#faf4d8",fontWeight:700}}>Red Dragon Flowerhorn</div>
              <div style={{fontSize:13,color:"#888"}}>₹3,500 · In stock · 5–6 inch</div>
            </div>

              <div style={{width:22,height:22,background:BRAND,borderRadius:3,flexShrink:0}}/>
              <span style={{fontFamily:WF,fontSize:16,fontWeight:700,color:"#090909"}}>FlowerHorn Shop</span>
              <span style={{fontFamily:WF,fontSize:11,color:"#aaa",background:"#f0ebe3",padding:"1px 8px",borderRadius:20}}>Website Wireframes</span>
            </Row>
            <Row gap={3}>
              {PAGES.map(p=>(
                <button key={p.id} onClick={()=>sw(p.id)} style={{padding:"4px 11px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:WF,fontSize:13,fontWeight:600,background:ap===p.id?BRAND:"transparent",color:ap===p.id?"#fff":"#777"}}>
                  {p.label}
                </button>
              ))}
            </Row>
            {page&&page.variants.length>1&&(
              <Row gap={5}>
                {page.variants.map(v=>(
                  <button key={v.id} onClick={()=>setAv(v.id)} style={{padding:"3px 10px",borderRadius:50,border:`1.5px solid ${av===v.id?BRAND:"#ccc"}`,cursor:"pointer",fontFamily:WF,fontSize:12,fontWeight:600,background:av===v.id?"rgba(140,37,21,0.08)":"#fff",color:av===v.id?BRAND:"#888"}}>
                    {v.label}
                  </button>
                ))}
              </Row>
            )}
          </Row>
        </div>
      </div>
      <div style={{maxWidth:1200,margin:"14px auto 40px",background:"#fff",boxShadow:"0 0 0 1px rgba(0,0,0,0.07),0 4px 24px rgba(0,0,0,0.05)"}}>
        {C&&<C/>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
